<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patrik's intake — today — 2026-06-13</title>
<link rel="icon" href="data:image/svg+xml,<svg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'><rect%20width='32'%20height='32'%20rx='7'%20fill='%231D9E75'/><path%20d='M11%208v7a3%203%200%200%200%206%200V8M14%2015v9'%20fill='none'%20stroke='%23fff'%20stroke-width='2'%20stroke-linecap='round'/><path%20d='M22%208c-2%200-3%203-3%207s1%204%203%204%200-2%200-5-1-6-3-6z'%20fill='%23fff'/></svg>">
<style>
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
body{padding:20px;transition:background .2s}
#wrap{--bg:#ffffff;--surf:#f1efe8;--tp:#1a1a18;--ts:rgba(0,0,0,0.62);--bd:rgba(0,0,0,0.28);background:var(--bg);color:var(--tp);padding:16px;border-radius:12px;width:100%;max-width:900px;margin:0 auto;box-sizing:border-box}
#wrap.dark{--bg:#262624;--surf:#33322f;--tp:#ffffff;--ts:rgba(255,255,255,0.72);--bd:rgba(255,255,255,0.22)}
#wrap.mobile{padding:14px}
#wrap.big{zoom:1.5;width:calc(100%/1.5);max-width:600px}
.card{background:var(--surf);border-radius:8px;padding:0.85rem 1rem}
.lab{font-size:13px;color:var(--ts)}
.sub{font-size:12px;color:var(--ts)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:0 0 1.25rem}
#wrap.mobile .cards{grid-template-columns:1fr 1fr;gap:10px}
.h{font-size:16px;font-weight:500;letter-spacing:0.08em;margin:0 0 0.75rem}
.bars{display:flex;flex-direction:column;gap:13px;margin:0 0 1.5rem}
.brow .bl{display:flex;justify-content:space-between;font-size:13px;color:var(--ts);margin-bottom:5px}
.brow .bl b{color:var(--tp);font-weight:500}
.track{background:var(--surf);height:9px;border-radius:5px;overflow:hidden}
.fill{height:100%;border-radius:5px;transition:width .3s}
table{width:100%;border-collapse:collapse;font-size:13px;margin:0 0 1.5rem}
th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ts);text-align:right;padding:0 8px 8px;font-weight:500}
th:first-child{text-align:left;padding-left:4px}
td{padding:8px;text-align:right;font-variant-numeric:tabular-nums;border-top:0.5px solid var(--bd)}
td:first-child{text-align:left;color:var(--ts);padding-left:4px}
tfoot td{font-weight:600;border-top:1px solid var(--bd)}
.note{background:var(--bg);border:0.5px solid var(--bd);border-radius:12px;padding:1rem 1.25rem;margin-bottom:0.25rem;line-height:1.6}
.state{text-align:center;padding:60px 20px;color:var(--ts);font-size:13px}
</style>
</head>
<body>
<div id="wrap">
<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 1.25rem;flex-wrap:wrap;">
  <div class="ttl" data-i="title" style="font-size:20px;font-weight:500;letter-spacing:0.04em;">PATRIK'S INTAKE — TODAY</div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
    <button id="btn-en" onclick="setLang('en')">EN</button>
    <button id="btn-hr" onclick="setLang('hr')">HR</button>
    <button id="btn-lt" onclick="applyTheme('light')" aria-label="Light mode"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-3px" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
    <button id="btn-dk" onclick="applyTheme('dark')" aria-label="Dark mode"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
    <button id="btn-fs" onclick="toggleFont()" aria-label="Large font"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-3px" aria-hidden="true"><circle cx="9" cy="10" r="4.5"/><path d="M12.2 13.2L16 17"/><path d="M7 10h4M9 8v4"/></svg></button>
  </div>
</div>

<div id="sub" class="sub" style="margin:0 0 1rem;"></div>

<div id="content"><div class="state">Loading…</div></div>

<p class="lab" style="font-size:11px;margin:10px 2px 0;"><span data-i="foot">Intake logged live · macro targets per plan</span> · Intake Dashboard, part of Daily Dashboard · by <a href="mailto:patrik.pencinger@gmail.com" style="color:inherit;">Patrik Pencinger</a></p>
</div>

<script>
let theme=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
let lang='en',fontbig=false,layout='';
let DATA=null;
const T={
 en:{title:"PATRIK'S INTAKE — TODAY",macros:"MACROS VS TARGET",fill:"FILL RATE",energy:"ENERGY BALANCE",foodlog:"FOOD LOG",insights:"INSIGHTS",
   cal:"Calories",prot:"Protein",carb:"Carbs",fat:"Fat",total:"Total",deficit:"deficit",surplus:"surplus",over:"over",target:"target",
   burn:"Burn (TDEE)",intake:"Intake",item:"Item",foot:"Intake logged live · macro targets per plan"},
 hr:{title:"PATRIKOV UNOS — DANAS",macros:"MAKROI VS CILJ",fill:"ISPUNJENOST",energy:"ENERGETSKA BILANCA",foodlog:"DNEVNIK PREHRANE",insights:"UVIDI",
   cal:"Kalorije",prot:"Proteini",carb:"UH",fat:"Masti",total:"Ukupno",deficit:"deficit",surplus:"višak",over:"iznad",target:"cilj",
   burn:"Potrošnja (TDEE)",intake:"Unos",item:"Stavka",foot:"Unos uživo · ciljevi makroa po planu"}
};
let LBL=T.en;
const pct=(v,m)=>Math.min(100,Math.round(v/m*100));

function render(){
 if(!DATA){return;}
 const k=DATA.intake,tgt=k.target,tot=k.total;
 const bal=k.tdee-tot.kcal;
 document.getElementById('sub').textContent=k.date+" · "+k.dayType;
 const bar=(lbl,val,max,unit)=>{const over=val>max;const w=pct(val,max);
  return `<div class="brow"><div class="bl"><span>${lbl}</span><b style="color:${over?'#BA7517':'var(--tp)'}">${val}${unit} / ${max}${unit} · ${w}%${over?' · '+LBL.over:''}</b></div>
   <div class="track"><div class="fill" style="width:${w}%;background:${over?'#BA7517':'#1D9E75'}"></div></div></div>`;};
 const card=(lab,val,sub,col)=>`<div class="card"><div class="lab">${lab}</div><div style="font-size:24px;font-weight:500;${col?'color:'+col:''}">${val}</div><div class="sub">${sub}</div></div>`;
 const intakeW=Math.round(tot.kcal/k.tdee*100);
 const pMet=tot.p>=tgt.p, pGap=tgt.p-tot.p;
 const insColor=pMet?'#1D9E75':'#BA7517';
 const insHeadEn=pMet?('Protein '+tot.p+'g — on target'):('Protein '+tot.p+'g — '+pGap+'g under target');
 const insHeadHr=pMet?('Proteini '+tot.p+'g — na cilju'):('Proteini '+tot.p+'g — '+pGap+'g ispod cilja');
 const balEn=bal>=0?(bal+' kcal deficit'):(Math.abs(bal)+' kcal surplus');
 const balHr=bal>=0?(bal+' kcal deficit'):(Math.abs(bal)+' kcal višak');
 const insBodyEn='Net balance is a '+balEn+' vs a ~'+k.tdee.toLocaleString()+' TDEE on a '+k.dayType+'. '+(pMet?('Protein hit the '+tgt.p+'g target. '):('Protein landed '+pGap+'g short of the '+tgt.p+'g target — worth topping up on a training day. '))+'Carbs '+tot.c+'g · fat '+tot.f+'g.';
 const insBodyHr='Neto bilanca je '+balHr+' uz ~'+k.tdee.toLocaleString()+' TDEE, dan: '+k.dayType+'. '+(pMet?('Proteini su dosegli cilj od '+tgt.p+'g. '):('Proteini su '+pGap+'g ispod cilja od '+tgt.p+'g — vrijedi nadopuniti na dan treninga. '))+'UH '+tot.c+'g · masti '+tot.f+'g.';
 const html=`
  <div class="h">${LBL.macros}</div>
  <div class="cards">
   ${card(LBL.cal,tot.kcal.toLocaleString(),'/ '+tgt.kcal.toLocaleString()+' '+LBL.target,'')}
   ${card(LBL.prot,tot.p+'g','/ '+tgt.p+'g'+(tot.p>=tgt.p?' ✓':''),'#1D9E75')}
   ${card(LBL.carb,tot.c+'g','/ '+tgt.c+'g','')}
   ${card(LBL.fat,tot.f+'g','/ '+tgt.f+'g','')}
  </div>
  <div class="h">${LBL.fill}</div>
  <div class="bars">
   ${bar(LBL.cal,tot.kcal,tgt.kcal,'')}
   ${bar(LBL.prot,tot.p,tgt.p,'g')}
   ${bar(LBL.carb,tot.c,tgt.c,'g')}
   ${bar(LBL.fat,tot.f,tgt.f,'g')}
  </div>
  <div class="h">${LBL.energy}</div>
  <div style="margin:0 0 1.5rem;">
   <div class="bl" style="display:flex;justify-content:space-between;font-size:13px;color:var(--ts);margin-bottom:5px;"><span>${LBL.burn}</span><b style="color:var(--tp)">~${k.tdee.toLocaleString()}</b></div>
   <div class="track" style="height:13px;margin-bottom:12px;"><div class="fill" style="width:100%;background:#54718D"></div></div>
   <div class="bl" style="display:flex;justify-content:space-between;font-size:13px;color:var(--ts);margin-bottom:5px;"><span>${LBL.intake}</span><b style="color:${bal>=0?'#1D9E75':'#BA7517'}">${tot.kcal.toLocaleString()} · ${bal>=0?LBL.deficit+' −'+bal:LBL.surplus+' +'+Math.abs(bal)}</b></div>
   <div class="track" style="height:13px;"><div class="fill" style="width:${intakeW}%;background:#2caaf0"></div></div>
  </div>
  <div class="h">${LBL.foodlog}</div>
  <table>
   <thead><tr><th>${LBL.item}</th><th>kcal</th><th>P</th><th>C</th><th>F</th></tr></thead>
   <tbody>${k.log.map(f=>`<tr><td>${f.name}</td><td>${f.kcal}</td><td>${f.p}</td><td>${f.c}</td><td>${f.f}</td></tr>`).join('')}</tbody>
   <tfoot><tr><td>${LBL.total}</td><td>${tot.kcal}</td><td>${tot.p}</td><td>${tot.c}</td><td>${tot.f}</td></tr></tfoot>
  </table>
  <div class="h">${LBL.insights}</div>
  <div class="note">
   <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${insColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-4px" aria-hidden="true"><path d="M20 6L9 17l-5-5"/></svg>
    <span style="font-weight:500;font-size:15px;">${lang==='en'?insHeadEn:insHeadHr}</span>
   </div>
   <p class="lab" style="margin:0;line-height:1.6;">${lang==='en'?insBodyEn:insBodyHr}</p>
  </div>`;
 document.getElementById('content').innerHTML=html;
}

function applyTheme(t){theme=t;document.getElementById('wrap').classList.toggle('dark',t==='dark');
 document.body.style.background=t==='dark'?'#262624':'#ffffff';markBtns();}
function setLang(l){lang=l;LBL=T[l];
 document.querySelectorAll('[data-i]').forEach(el=>{const k=el.getAttribute('data-i');if(LBL[k]!==undefined)el.textContent=LBL[k];});
 render();markBtns();}
function toggleFont(){fontbig=!fontbig;document.getElementById('wrap').classList.toggle('big',fontbig);markBtns();}
function applyResponsive(){const want=window.innerWidth<560?'mobile':'desktop';if(layout===want)return;layout=want;
 document.getElementById('wrap').classList.toggle('mobile',want==='mobile');}
function markBtns(){
 const D=theme==='dark';
 const actBg=D?'#e8e8e6':'#444441',actFg=D?'#262624':'#ffffff';
 const inFg=D?'#e8e8e6':'#2c2c2a';
 const bd=D?'1px solid rgba(255,255,255,0.35)':'1px solid rgba(0,0,0,0.4)';
 const style=(b,on)=>{if(!b)return;b.style.background=on?actBg:'transparent';b.style.color=on?actFg:inFg;b.style.border=bd;b.style.borderRadius='8px';b.style.padding='4px 10px';b.style.fontSize='12px';b.style.fontWeight='500';b.style.cursor='pointer';};
 const states={'btn-en':lang==='en','btn-hr':lang==='hr','btn-lt':theme==='light','btn-dk':theme==='dark','btn-fs':fontbig};
 Object.entries(states).forEach(([id,on])=>style(document.getElementById(id),on));
}
applyTheme(theme);applyResponsive();markBtns();
window.addEventListener('resize',applyResponsive);

fetch('data.json',{cache:'no-store'})
 .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
 .then(j=>{DATA=j;render();})
 .catch(err=>{document.getElementById('content').innerHTML=
   `<div class="state">Couldn't load data.json (${err.message}).<br><br>If you opened this file directly, serve it over http (it works on GitHub Pages).</div>`;});
</script>
</body>
</html>
